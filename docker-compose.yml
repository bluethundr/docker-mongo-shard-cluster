services:
  cfg1:
    image: mongodb/mongodb-community-server:8.0
    container_name: cfg1
    command: >
      mongod --configsvr --replSet cfgReplSet --port 27017
      --bind_ip_all --dbpath /data/db
    volumes:
      - cfg1_data:/data/db
    networks:
      - mongo-shard-net

